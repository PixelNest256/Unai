<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills — Unai</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body { overflow: hidden; }

    /* ── Overall layout ── */
    #skills-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ── */
    .skills-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .btn-back {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: var(--mono); font-size: 12px;
      cursor: pointer; transition: var(--transition); text-decoration: none;
    }
    .btn-back:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }
    .skills-topbar-title {
      font-family: var(--sans); font-size: 18px; font-weight: 700; color: var(--text);
    }

    /* ── Two-pane body ── */
    .skills-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ════════════════════════════
       LEFT SIDEBAR
    ════════════════════════════ */
    .skills-sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .skills-sidebar-top {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Import + Preload row */
    .sidebar-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-import-zip {
      flex: 1;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2); font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: var(--transition);
    }
    .btn-import-zip:hover {
      border-color: var(--accent-dim); color: var(--accent);
      background: rgba(127,255,110,0.05);
    }

    .preload-toggle-wrap {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--muted); font-family: var(--mono);
      cursor: pointer; user-select: none; flex-shrink: 0;
    }
    /* shrink the toggle for the sidebar */
    .preload-toggle-wrap .toggle {
      width: 32px; height: 18px;
    }
    .preload-toggle-wrap .toggle-track::after {
      width: 11px; height: 11px;
    }
    .preload-toggle-wrap .toggle input:checked + .toggle-track::after {
      left: calc(100% - 14px);
    }

    /* Search */
    .sidebar-search-wrap {
      position: relative; display: flex; align-items: center;
    }
    .sidebar-search-icon {
      position: absolute; left: 9px; color: var(--muted);
      pointer-events: none; display: flex; align-items: center;
    }
    #skill-search {
      width: 100%; padding: 6px 26px 6px 29px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-family: var(--mono); font-size: 12px;
      outline: none; transition: var(--transition);
    }
    #skill-search::placeholder { color: var(--muted); }
    #skill-search:focus { border-color: var(--border2); background: var(--surface2); }
    .sidebar-search-clear {
      position: absolute; right: 7px; background: none; border: none;
      cursor: pointer; color: var(--muted); display: none; align-items: center;
      padding: 2px; border-radius: 3px; transition: var(--transition);
    }
    .sidebar-search-clear:hover { color: var(--text); }
    .sidebar-search-clear.visible { display: flex; }

    /* Skill list */
    .skills-list-wrap {
      flex: 1; overflow-y: auto; padding: 5px;
    }
    .skills-list-wrap::-webkit-scrollbar { width: 3px; }
    .skills-list-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    .skill-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer; transition: var(--transition);
      user-select: none; position: relative;
    }
    .skill-item:hover { background: var(--surface2); border-color: var(--border); }
    .skill-item.active { background: var(--surface2); border-color: var(--border2); }
    .skill-item.active::before {
      content: '';
      position: absolute; left: 0; top: 18%; bottom: 18%;
      width: 2px; background: var(--accent); border-radius: 99px;
    }
    .skill-item.dragging { opacity: 0.4; }
    .skill-item.drag-over { border-color: var(--accent) !important; background: var(--surface2); }

    .skill-item-drag {
      display: flex; flex-direction: column; gap: 2.5px;
      cursor: grab; padding: 2px 3px; flex-shrink: 0;
      opacity: 0.25; transition: var(--transition);
    }
    .skill-item:hover .skill-item-drag { opacity: 0.7; }
    .skill-item-drag:active { cursor: grabbing; }
    .skill-item-drag .dr { display: flex; gap: 2.5px; }
    .skill-item-drag .dd {
      width: 2.5px; height: 2.5px; border-radius: 50%; background: var(--muted);
    }

    .skill-item-info { flex: 1; min-width: 0; }
    .skill-item-name {
      font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .skill-item.disabled-item .skill-item-name { opacity: 0.45; }
    .skill-item-author {
      font-size: 10px; color: var(--muted); font-family: var(--mono);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* mini toggle inside list items */
    .skill-item .toggle { width: 28px; height: 17px; flex-shrink: 0; }
    .skill-item .toggle-track::after { width: 11px; height: 11px; left: 2px; }
    .skill-item .toggle input:checked + .toggle-track::after { left: calc(100% - 13px); }

    .skill-item.search-hidden { display: none; }

    .no-results-msg {
      display: none; font-size: 11px; color: var(--muted); font-family: var(--mono);
      padding: 16px 8px; text-align: center;
    }
    .no-results-msg.visible { display: block; }

    /* Import status bar */
    .import-status-bar {
      padding: 7px 14px; font-size: 11px; font-family: var(--mono); color: var(--muted);
      border-top: 1px solid var(--border); min-height: 32px; flex-shrink: 0;
      line-height: 1.5;
    }
    .import-status-bar.ok   { color: var(--accent); }
    .import-status-bar.err  { color: var(--danger); }
    .import-status-bar.warn { color: #f0a500; }

    /* ════════════════════════════
       RIGHT MAIN PANE
    ════════════════════════════ */
    .skills-main {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .skills-main::-webkit-scrollbar { width: 6px; }
    .skills-main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* Empty state */
    .skills-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-family: var(--mono); font-size: 12px;
      padding: 40px;
    }
    .skills-empty svg { opacity: 0.18; }

    /* Detail view */
    .skill-detail {
      display: none; flex-direction: column;
      padding: 36px 44px 60px; max-width: 820px;
    }
    .skill-detail.visible { display: flex; }

    /* Detail header */
    .skill-detail-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 20px; margin-bottom: 6px;
    }
    .skill-detail-name {
      font-family: var(--sans); font-size: 28px; font-weight: 800;
      color: var(--text); line-height: 1.15; word-break: break-word;
    }
    .skill-detail-actions {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0; padding-top: 5px;
    }
    .btn-sd-action {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 11px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: var(--transition); text-decoration: none; white-space: nowrap;
    }
    .btn-sd-action:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
    .btn-sd-action.danger:hover { color: var(--danger); border-color: var(--danger); background: rgba(255,94,94,0.06); }

    /* Meta row */
    .skill-detail-meta {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      margin-bottom: 18px;
    }
    .skill-detail-meta .meta-id {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 7px;
    }
    .skill-detail-meta .meta-ext {
      color: var(--accent-dim); border: 1px solid var(--accent-dim);
      border-radius: 3px; padding: 1px 7px;
    }

    .skill-detail-desc {
      font-size: 13px; color: var(--text2); line-height: 1.75; margin-bottom: 28px;
    }
    .skill-detail-divider { height: 1px; background: var(--border); margin: 0 0 26px; }

    .skill-section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 12px;
    }

    /* Help box */
    .skill-help-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 15px 17px;
      font-family: var(--mono); font-size: 12px; color: var(--text2);
      line-height: 1.7; white-space: pre-wrap; word-break: break-word;
      max-height: 280px; overflow-y: auto; margin-bottom: 34px;
    }
    .skill-help-box::-webkit-scrollbar { width: 4px; }
    .skill-help-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    .skill-help-empty { color: var(--muted); font-style: italic; }

    /* ── Valves ── */
    .valves-form {
      display: flex; flex-direction: column; gap: 16px; margin-bottom: 22px;
    }
    .valve-row { display: flex; flex-direction: column; gap: 4px; }
    .valve-label-row {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 1px;
    }
    .valve-label {
      font-size: 12px; font-weight: 600; color: var(--text); font-family: var(--mono);
    }
    .valve-key-tag {
      font-size: 10px; color: var(--muted); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 3px; padding: 0 5px;
      font-family: var(--mono);
    }
    .valve-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .valve-input {
      padding: 7px 11px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-family: var(--mono); font-size: 12px;
      width: 100%; max-width: 480px; outline: none; transition: var(--transition);
    }
    .valve-input:focus { border-color: var(--border2); background: var(--surface2); }
    .valve-input[type="number"] { appearance: textfield; -moz-appearance: textfield; max-width: 160px; }
    .valve-input[type="number"]::-webkit-inner-spin-button { display: none; }

    .valves-save-row { display: flex; align-items: center; gap: 12px; }
    .btn-save-valves {
      padding: 7px 20px; border-radius: var(--radius-sm);
      border: 1px solid var(--accent-dim);
      background: rgba(127,255,110,0.07); color: var(--accent);
      font-family: var(--mono); font-size: 12px; cursor: pointer; transition: var(--transition);
    }
    .btn-save-valves:hover { background: rgba(127,255,110,0.16); }
    .valves-saved-msg {
      font-size: 11px; color: var(--accent); font-family: var(--mono);
      opacity: 0; transition: opacity 0.3s;
    }
    .valves-saved-msg.show { opacity: 1; }

    /* ── Save indicator ── */
    #save-indicator {
      position: fixed; bottom: 28px; right: 32px;
      font-family: var(--mono); font-size: 11px; color: var(--accent);
      background: var(--surface); border: 1px solid var(--accent-dim);
      border-radius: 99px; padding: 5px 14px;
      opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 20;
    }
    #save-indicator.show { opacity: 1; }
  </style>
</head>
<body>
<div id="skills-page">

  <!-- ── Top bar ── -->
  <div class="skills-topbar">
    <a href="/" class="btn-back">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M8 1L3 6l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <span class="skills-topbar-title">Skills</span>
  </div>

  <!-- ── Body ── -->
  <div class="skills-body">

    <!-- ════ LEFT SIDEBAR ════ -->
    <div class="skills-sidebar">

      <div class="skills-sidebar-top">

        <!-- Import ZIP + Preload toggle -->
        <div class="sidebar-controls">
          <button class="btn-import-zip" id="btn-import-trigger">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M6 1v7M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1 9v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Install ZIP
          </button>
          <input type="file" id="import-file" accept=".zip" style="display:none">

          <label class="preload-toggle-wrap" title="Preload all enabled Skills into memory at startup">
            <label class="toggle">
              <input type="checkbox" id="toggle-preload" checked>
              <span class="toggle-track"></span>
            </label>
            Preload
          </label>
        </div>

        <!-- Search -->
        <div class="sidebar-search-wrap">
          <span class="sidebar-search-icon">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M8 8l2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </span>
          <input type="text" id="skill-search" placeholder="Filter skills…" autocomplete="off" spellcheck="false">
          <button class="sidebar-search-clear" id="skill-search-clear" tabindex="-1" aria-label="Clear">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="none">
              <path d="M2 2l6 6M8 2L2 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

      </div><!-- .skills-sidebar-top -->

      <!-- Skill list -->
      <div class="skills-list-wrap">
        <div id="skill-list"><!-- populated by JS --></div>
        <div class="no-results-msg" id="no-results-msg">No skills match.</div>
      </div>

      <!-- Import status -->
      <div class="import-status-bar" id="import-status"></div>

    </div><!-- .skills-sidebar -->

    <!-- ════ RIGHT MAIN PANE ════ -->
    <div class="skills-main" id="skills-main">

      <!-- Empty / placeholder -->
      <div class="skills-empty" id="skills-empty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.4"/>
          <path d="M8 12h8M8 8h8M8 16h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span>Select a Skill to view details</span>
      </div>

      <!-- Detail pane -->
      <div class="skill-detail" id="skill-detail">

        <!-- Header: name + action buttons -->
        <div class="skill-detail-header">
          <h1 class="skill-detail-name" id="detail-name">—</h1>
          <div class="skill-detail-actions">
            <a class="btn-sd-action" id="detail-export-btn" href="#" download>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                <path d="M6 1v7M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 9v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>Export
            </a>
            <button class="btn-sd-action danger" id="detail-delete-btn">
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                <path d="M1 3h10M4 3V2h4v1M5 5v4M7 5v4M2 3l.7 7.3A1 1 0 0 0 3.7 11h4.6a1 1 0 0 0 1-.7L10 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>Delete
            </button>
          </div>
        </div>

        <!-- Author / version / id badges -->
        <div class="skill-detail-meta" id="detail-meta"><!-- JS --></div>

        <!-- Description -->
        <div class="skill-detail-desc" id="detail-desc">—</div>

        <div class="skill-detail-divider"></div>

        <!-- ── Help ── -->
        <div class="skill-section-label">Help</div>
        <div class="skill-help-box" id="detail-help">
          <span class="skill-help-empty">Loading…</span>
        </div>

        <!-- ── Valves ── (hidden when no valves) -->
        <div id="valves-section" style="display:none">
          <div class="skill-detail-divider"></div>
          <div class="skill-section-label">Valves</div>
          <div class="valves-form" id="valves-form"><!-- JS --></div>
          <div class="valves-save-row">
            <button class="btn-save-valves" id="btn-save-valves">Save</button>
            <span class="valves-saved-msg" id="valves-saved-msg">Saved.</span>
          </div>
        </div>

      </div><!-- .skill-detail -->
    </div><!-- .skills-main -->

  </div><!-- .skills-body -->
</div><!-- #skills-page -->

<!-- ── Delete confirm overlay ── -->
<div id="delete-overlay" style="display:none;position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(4px);z-index:400;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:26px 28px;max-width:320px;width:90%;animation:scaleIn 0.16s ease;">
    <div style="font-family:var(--sans);font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;">Delete Skill</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:22px;line-height:1.6;">
      "<span id="delete-skill-name"></span>" will be permanently deleted from disk.
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button id="cancel-delete" style="font-family:var(--mono);font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;">Cancel</button>
      <button id="confirm-delete" style="font-family:var(--mono);font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--danger);background:rgba(255,94,94,0.07);color:var(--danger);cursor:pointer;">Delete</button>
    </div>
  </div>
</div>

<div id="save-indicator">Saved</div>

<script>
/* ── Theme ── */
const prefs = (() => { try { return JSON.parse(localStorage.getItem('unai_prefs')) || {}; } catch { return {}; } })();
document.documentElement.setAttribute('data-theme', prefs.theme || 'dark');

/* ── Save indicator ── */
const saveInd = document.getElementById('save-indicator');
let saveTimer;
function flashSaved() {
  saveInd.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveInd.classList.remove('show'), 1600);
}

/* ── State ── */
let skillOrder   = [];  // ordered IDs (full, unfiltered)
let allSkills    = [];  // all skill meta objects
let selectedId   = null;
let currentQuery = '';
let dragSrcId    = null;

/* ── Utility ── */
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ════════════════════════════
   RENDER LEFT LIST
════════════════════════════ */
function renderList(skills) {
  skillOrder = skills.map(s => s.id);
  allSkills  = skills;
  const list = document.getElementById('skill-list');
  list.innerHTML = '';

  skills.forEach((skill) => {
    const item = document.createElement('div');
    item.className = 'skill-item' + (skill.enabled ? '' : ' disabled-item');
    item.dataset.id          = skill.id;
    item.dataset.skillName   = skill.name   || skill.id;
    item.dataset.skillAuthor = skill.author || '';
    item.dataset.skillDesc   = skill.description || '';
    item.draggable = true;

    item.innerHTML = `
      <div class="skill-item-drag" title="Drag to reorder">
        <div class="dr"><div class="dd"></div><div class="dd"></div></div>
        <div class="dr"><div class="dd"></div><div class="dd"></div></div>
        <div class="dr"><div class="dd"></div><div class="dd"></div></div>
      </div>
      <div class="skill-item-info">
        <div class="skill-item-name">${escHtml(skill.name || skill.id)}</div>
        <div class="skill-item-author">by ${escHtml(skill.author || 'unknown')}</div>
      </div>
      <label class="toggle" style="flex-shrink:0" onclick="event.stopPropagation()">
        <input type="checkbox" class="skill-enable-toggle" data-id="${escHtml(skill.id)}" ${skill.enabled ? 'checked' : ''}>
        <span class="toggle-track"></span>
      </label>
    `;

    /* Click → select */
    item.addEventListener('click', () => selectSkill(skill.id));

    /* Enable/Disable toggle */
    item.querySelector('.skill-enable-toggle').addEventListener('change', async (e) => {
      e.stopPropagation();
      try {
        await fetch('/api/skills/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: skill.id }),
        });
        item.classList.toggle('disabled-item', !e.target.checked);
        flashSaved();
      } catch { e.target.checked = !e.target.checked; }
    });

    /* ── Drag & Drop ── */
    item.addEventListener('dragstart', e => {
      dragSrcId = skill.id;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      document.querySelectorAll('.skill-item').forEach(r => r.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrcId !== skill.id) item.classList.add('drag-over');
    });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', async e => {
      e.preventDefault();
      item.classList.remove('drag-over');
      if (dragSrcId === skill.id) return;
      const from = skillOrder.indexOf(dragSrcId);
      const to   = skillOrder.indexOf(skill.id);
      skillOrder.splice(from, 1);
      skillOrder.splice(to, 0, dragSrcId);
      await saveOrder();
      await loadSkills();
    });

    list.appendChild(item);
  });

  // Restore active highlight
  if (selectedId) markActive(selectedId);
  applyFilter();
}

function markActive(id) {
  document.querySelectorAll('.skill-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

/* ════════════════════════════
   FILTER
════════════════════════════ */
function applyFilter() {
  const q     = currentQuery.trim().toLowerCase();
  const items = document.querySelectorAll('#skill-list .skill-item');
  let visible = 0;
  items.forEach(item => {
    if (!q) {
      item.classList.remove('search-hidden');
      visible++;
      return;
    }
    const name   = (item.dataset.skillName   || '').toLowerCase();
    const author = (item.dataset.skillAuthor || '').toLowerCase();
    const desc   = (item.dataset.skillDesc   || '').toLowerCase();
    const match  = name.includes(q) || author.includes(q) || desc.includes(q);
    item.classList.toggle('search-hidden', !match);
    if (match) visible++;
  });
  const noMsg = document.getElementById('no-results-msg');
  noMsg.classList.toggle('visible', items.length > 0 && visible === 0);
}

/* ════════════════════════════
   SELECT SKILL → POPULATE RIGHT PANE
════════════════════════════ */
async function selectSkill(id) {
  selectedId = id;
  markActive(id);

  const skill = allSkills.find(s => s.id === id);
  if (!skill) return;

  // Show detail, hide empty
  document.getElementById('skills-empty').style.display = 'none';
  document.getElementById('skill-detail').classList.add('visible');

  // Static fields
  document.getElementById('detail-name').textContent = skill.name || skill.id;
  document.getElementById('detail-desc').textContent = skill.description || '—';

  // Meta badges
  const metaEl = document.getElementById('detail-meta');
  const hasExt = skill.request_urls && skill.request_urls.length > 0;
  metaEl.innerHTML = `
    <span class="meta-id">${escHtml(skill.id)}</span>
    <span>by ${escHtml(skill.author || 'unknown')}</span>
    <span>v${escHtml(skill.version || '?')}</span>
    ${hasExt ? '<span class="meta-ext">external</span>' : ''}
  `;

  // Export link
  const exportBtn = document.getElementById('detail-export-btn');
  exportBtn.href     = `/api/skills/${encodeURIComponent(id)}/export`;
  exportBtn.download = `${id}.zip`;

  // ── Help ──
  const helpBox = document.getElementById('detail-help');
  helpBox.innerHTML = '<span class="skill-help-empty">Loading…</span>';
  try {
    const hr = await fetch(`/api/skills/${encodeURIComponent(id)}/help`);
    const hd = await hr.json();
    if (hd.help) {
      helpBox.textContent = hd.help;
    } else {
      helpBox.innerHTML = '<span class="skill-help-empty">No help text available.</span>';
    }
  } catch {
    helpBox.innerHTML = '<span class="skill-help-empty">Failed to load help.</span>';
  }

  // ── Valves ──
  const valvesSec = document.getElementById('valves-section');
  try {
    const vr   = await fetch(`/api/skills/${encodeURIComponent(id)}/valves`);
    const vd   = await vr.json();
    const defs = vd.definitions || [];
    const vals = vd.values      || {};
    if (defs.length > 0) {
      valvesSec.style.display = '';
      buildValvesForm(defs, vals);
    } else {
      valvesSec.style.display = 'none';
    }
  } catch {
    valvesSec.style.display = 'none';
  }
}

/* ── Build Valves form ── */
function buildValvesForm(defs, vals) {
  const form = document.getElementById('valves-form');
  form.innerHTML = '';
  defs.forEach(def => {
    const inputType = def.type === 'password' ? 'password'
                    : def.type === 'number'   ? 'number'
                    : 'text';
    const row = document.createElement('div');
    row.className = 'valve-row';
    row.innerHTML = `
      <div class="valve-label-row">
        <span class="valve-label">${escHtml(def.label || def.key)}</span>
        <span class="valve-key-tag">${escHtml(def.key)}</span>
      </div>
      ${def.description ? `<div class="valve-desc">${escHtml(def.description)}</div>` : ''}
      <input class="valve-input" type="${inputType}"
             data-key="${escHtml(def.key)}"
             value="${escHtml(String(vals[def.key] !== undefined ? vals[def.key] : (def.default || '')))}"
             placeholder="${escHtml(def.placeholder || '')}"
             autocomplete="off" spellcheck="false">
    `;
    form.appendChild(row);
  });
}

/* ── Save Valves ── */
document.getElementById('btn-save-valves').addEventListener('click', async () => {
  if (!selectedId) return;
  const inputs = document.querySelectorAll('#valves-form .valve-input');
  const values = {};
  inputs.forEach(inp => { values[inp.dataset.key] = inp.value; });
  try {
    await fetch(`/api/skills/${encodeURIComponent(selectedId)}/valves`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(values),
    });
    const msg = document.getElementById('valves-saved-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2200);
    flashSaved();
  } catch { /* silent */ }
});

/* ════════════════════════════
   DELETE
════════════════════════════ */
let deleteTarget = null;

document.getElementById('detail-delete-btn').addEventListener('click', () => {
  if (!selectedId) return;
  const skill = allSkills.find(s => s.id === selectedId);
  deleteTarget = selectedId;
  document.getElementById('delete-skill-name').textContent = skill ? (skill.name || skill.id) : selectedId;
  document.getElementById('delete-overlay').style.display = 'flex';
});

document.getElementById('cancel-delete').addEventListener('click', () => {
  document.getElementById('delete-overlay').style.display = 'none';
  deleteTarget = null;
});

document.getElementById('confirm-delete').addEventListener('click', async () => {
  if (!deleteTarget) return;
  const id = deleteTarget;
  document.getElementById('delete-overlay').style.display = 'none';
  deleteTarget = null;
  try {
    const res  = await fetch(`/api/skills/${encodeURIComponent(id)}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      flashSaved();
      if (selectedId === id) {
        selectedId = null;
        document.getElementById('skills-empty').style.display = '';
        document.getElementById('skill-detail').classList.remove('visible');
      }
      await loadSkills();
    } else {
      showImportStatus('Delete failed: ' + (data.error || '?'), 'err');
    }
  } catch { showImportStatus('Delete failed', 'err'); }
});

/* ════════════════════════════
   ORDER / LOAD
════════════════════════════ */
async function saveOrder() {
  try {
    await fetch('/api/skills/reorder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order: skillOrder }),
    });
    flashSaved();
  } catch { /* silent */ }
}

async function loadSkills() {
  try {
    const res    = await fetch('/api/skills');
    const skills = await res.json();
    renderList(skills);
    // If something was selected and still exists, refresh detail
    if (selectedId && skills.find(s => s.id === selectedId)) {
      const skill = skills.find(s => s.id === selectedId);
      // Only refresh static meta (name/desc/badges), not the async help+valves
      document.getElementById('detail-name').textContent = skill.name || skill.id;
      document.getElementById('detail-desc').textContent = skill.description || '—';
    }
  } catch { /* silent */ }
}

/* ════════════════════════════
   SEARCH
════════════════════════════ */
const searchInput = document.getElementById('skill-search');
const searchClear = document.getElementById('skill-search-clear');

searchInput.addEventListener('input', () => {
  currentQuery = searchInput.value;
  searchClear.classList.toggle('visible', currentQuery.length > 0);
  applyFilter();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  currentQuery = '';
  searchClear.classList.remove('visible');
  searchInput.focus();
  applyFilter();
});

/* ════════════════════════════
   PRELOAD TOGGLE
════════════════════════════ */
const preloadToggle = document.getElementById('toggle-preload');

async function loadPreloadSetting() {
  try {
    const res  = await fetch('/api/settings');
    const data = await res.json();
    preloadToggle.checked = data.preload_skills !== false;
  } catch { preloadToggle.checked = true; }
}

preloadToggle.addEventListener('change', async () => {
  try {
    await fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ preload_skills: preloadToggle.checked }),
    });
    flashSaved();
  } catch { preloadToggle.checked = !preloadToggle.checked; }
});

/* ════════════════════════════
   IMPORT
════════════════════════════ */
function showImportStatus(msg, cls = '') {
  const el = document.getElementById('import-status');
  el.textContent = msg;
  el.className = 'import-status-bar ' + cls;
}

document.getElementById('btn-import-trigger').addEventListener('click', () => {
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  showImportStatus('Installing…');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res  = await fetch('/api/skills/import', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.ok) {
      let msg = data.updated ? `Updated: ${data.skill_id}` : `Installed: ${data.skill_id}`;
      if (data.pip) msg += data.pip.ok ? '  (deps installed)' : '  ⚠ deps failed';
      showImportStatus(msg, data.pip && !data.pip.ok ? 'warn' : 'ok');
      if (data.pip && !data.pip.ok) console.warn('pip output:', data.pip.output);
      await loadSkills();
      // Auto-select the newly installed skill
      if (data.skill_id) selectSkill(data.skill_id);
    } else {
      showImportStatus('Error: ' + (data.error || 'unknown'), 'err');
    }
  } catch { showImportStatus('Network error', 'err'); }
});

/* ════════════════════════════
   INIT
════════════════════════════ */
loadSkills();
loadPreloadSetting();
</script>
