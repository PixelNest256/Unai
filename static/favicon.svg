<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#212121"/>

  <!--
    "u/" hand-drawn to match Syne 800 feel at 32px.
    Baseline at y=23, cap-height ~18px.
    u : two vertical strokes joined by a curve at the bottom
    /  : diagonal slash
  -->

  <!-- u — left stem -->
  <path d="M4 7 L4 20 Q4 25 9 25 Q14 25 14 20 L14 7"
        fill="none" stroke="#7fff6e" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- / — slash -->
  <line x1="19" y1="26" x2="28" y2="6"
        stroke="#7fff6e" stroke-width="3"
        stroke-linecap="round"/>
</svg>
